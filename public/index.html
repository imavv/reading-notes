<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#111827" />
    <meta name="description" content="Capture book notes via voice and text input" />

    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Bookworm" />

    <!-- iOS Icons -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/appstore.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="%PUBLIC_URL%/appstore.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/appstore.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="%PUBLIC_URL%/appstore.png" />

    <!-- Splash Screen for iOS -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <title>Bookworm</title>

    <style>
      /* Prevent pull-to-refresh on iOS when in standalone mode */
      html, body {
        overscroll-behavior-y: contain;
      }

      /* Safe area padding for iOS notch */
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }

      /* Prevent text selection on long press for app-like feel */
      * {
        -webkit-tap-highlight-color: transparent;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
